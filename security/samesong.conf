# Define memory zone for rate limiting: 10MB can track ~160k unique IP addresses.
# rate=10r/s: Allows 10 requests per second per IP.
limit_req_zone $binary_remote_addr zone=mylimit:10m rate=10r/s;

# Define memory zone for connection limiting: Max connections from a single IP.
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name localhost;

    # Increase max upload size (default is 1MB)
    client_max_body_size 100M;

    # Timeouts to drop slow/stale connections quickly (DDoS mitigation)
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 15s;
    send_timeout 10s;

    location / {
        # Apply rate limiting
        # burst=20: allows a quick spike of 20 requests before erroring
        # nodelay: keeps the response immediate for allowed requests
        limit_req zone=mylimit burst=20 nodelay;

        # Apply connection limiting
        limit_conn addr 10;

        # Proxy settings to Gunicorn
        proxy_pass http://web:5000;

        # Standard headers to ensure Flask gets the correct client IP/Protocol
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Disable buffering if you are doing long-polling or streaming
        # proxy_buffering off;
    }

    # Optional: Error page for rate-limited users
    error_page 503 /custom_503.html;
    location = /custom_503.html {
        root /usr/share/nginx/html;
        internal;
    }
}